<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Sparsa Cafe</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header{padding:15px;text-align:center;background:#3e2723;position:sticky;top:0}
.topBar{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#1b1b1b}
.form{background:#1e1e1e;margin:20px;padding:20px;border-radius:12px;max-width:600px;margin:20px auto}
input,select,button{background:#555;color:#fff;border:none;padding:10px;border-radius:6px;margin:5px 0;width:100%;box-sizing:border-box}
button{background:#795548;cursor:pointer}
button:hover{background:#a1887f}
.list{margin:20px auto;max-width:600px}
.item{display:flex;justify-content:space-between;align-items:center;background:#222;margin:10px 0;padding:10px;border-radius:6px}
.deleteBtn{background:#d32f2f;padding:5px 10px}
.deleteBtn:hover{background:#b71c1c}
.backBtn{background:#4caf50;padding:10px 20px;margin:10px}
.loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:1000}
.loginBox{background:#222;padding:30px;border-radius:12px;max-width:320px;width:90%;text-align:center}
.loginBox h3{margin-bottom:20px}
.loginBox input{width:100%;margin-bottom:15px}
#adminContent{display:none}
</style>
</head>
<body>
<div class="loginOverlay" id="loginOverlay" style="display:none;">
<div class="loginBox">
<h3>Admin Login</h3>
<input type="password" id="adminPassword" placeholder="Enter password">
<button onclick="authenticateAdmin()">Login</button>
</div>
</div>
<div id="adminContent">
<header>
<h2>☕ Sparsa Cafe - Admin Panel</h2>
</header>

<div class="topBar">
<button class="backBtn" onclick="window.location.href='index.html'">Back to Cafe</button>
<h3>Manage Menu Items</h3>
</div>

<div class="form">
<h3>Add New Item</h3>
<input type="text" id="itemName" placeholder="Item Name" required>
<input type="number" id="itemPrice" placeholder="Price (Rs.)" required>
<label>Image: Upload from device or enter URL</label><br>
<input type="file" id="itemImgFile" accept="image/*" style="margin:5px 0;">
<input type="url" id="itemImgUrl" placeholder="Or enter Image URL">
<select id="itemCategory" required>
<option value="">Select Category</option>
<option value="hot-drinks">Hot Drinks</option>
<option value="cold-drinks">Cold Drinks</option>
<option value="snacks">Snacks</option>
<option value="smoke">Smoke</option>
</select>
<button onclick="addItem()">Add Item</button>
</div>

<div class="list" id="itemList">
<h3>Current Items</h3>
<!-- Items will be listed here -->
</div>
</div>

<script>
const defaultMenu=[
// Hot Drinks
{name:"Coffee",price:100,img:"https://source.unsplash.com/200x150/?coffee",category:"hot-drinks"},
{name:"Tea",price:50,img:"https://source.unsplash.com/200x150/?tea",category:"hot-drinks"},
{name:"Cappuccino",price:150,img:"https://source.unsplash.com/200x150/?cappuccino",category:"hot-drinks"},
{name:"Hot Chocolate",price:120,img:"https://source.unsplash.com/200x150/?hot-chocolate",category:"hot-drinks"},
{name:"Latte",price:140,img:"https://source.unsplash.com/200x150/?latte",category:"hot-drinks"},
{name:"Espresso",price:80,img:"https://source.unsplash.com/200x150/?espresso",category:"hot-drinks"},

// Cold Drinks
{name:"Iced Coffee",price:120,img:"https://source.unsplash.com/200x150/?iced-coffee",category:"cold-drinks"},
{name:"Iced Tea",price:60,img:"https://source.unsplash.com/200x150/?iced-tea",category:"cold-drinks"},
{name:"Smoothie",price:130,img:"https://source.unsplash.com/200x150/?smoothie",category:"cold-drinks"},
{name:"Cold Brew",price:110,img:"https://source.unsplash.com/200x150/?cold-brew",category:"cold-drinks"},
{name:"Milkshake",price:140,img:"https://source.unsplash.com/200x150/?milkshake",category:"cold-drinks"},
{name:"Lemonade",price:70,img:"https://source.unsplash.com/200x150/?lemonade",category:"cold-drinks"},

// Snacks
{name:"Burger",price:250,img:"https://source.unsplash.com/200x150/?burger",category:"snacks"},
{name:"Pizza",price:500,img:"https://source.unsplash.com/200x150/?pizza",category:"snacks"},
{name:"Sandwich",price:180,img:"https://source.unsplash.com/200x150/?sandwich",category:"snacks"},
{name:"Fries",price:120,img:"https://source.unsplash.com/200x150/?fries",category:"snacks"},
{name:"Samosa",price:40,img:"https://source.unsplash.com/200x150/?samosa",category:"snacks"},
{name:"Pastry",price:100,img:"https://source.unsplash.com/200x150/?pastry",category:"snacks"},

// Smoke Variety
{name:"Cigarettes - Pack",price:300,img:"https://source.unsplash.com/200x150/?cigarettes",category:"smoke"},
{name:"Cigars",price:400,img:"https://source.unsplash.com/200x150/?cigars",category:"smoke"},
{name:"Pipe Tobacco",price:350,img:"https://source.unsplash.com/200x150/?tobacco",category:"smoke"},
{name:"Rolling Papers",price:50,img:"https://source.unsplash.com/200x150/?rolling-papers",category:"smoke"}
];

function getMenu(){
let stored = localStorage.getItem('cafeMenu');
if(stored){
return JSON.parse(stored);
}else{
localStorage.setItem('cafeMenu', JSON.stringify(defaultMenu));
return defaultMenu;
}
}

const ADMIN_PASSWORD = 'admin123';

function saveMenu(menu){
localStorage.setItem('cafeMenu', JSON.stringify(menu));
}

async function addItem(){
let name = document.getElementById('itemName').value.trim();
let price = parseInt(document.getElementById('itemPrice').value);
let category = document.getElementById('itemCategory').value;
let file = document.getElementById('itemImgFile').files[0];
let url = document.getElementById('itemImgUrl').value.trim();

if(!name || !price || !category){
alert('Please fill name, price, and category');
return;
}

let img = '';
if(file){
img = await readFileAsDataURL(file);
}else if(url){
img = url;
}else{
alert('Please select an image file or enter a URL');
return;
}

let menu = getMenu();
menu.push({name, price, img, category});
saveMenu(menu);

document.getElementById('itemName').value = '';
document.getElementById('itemPrice').value = '';
document.getElementById('itemImgFile').value = '';
document.getElementById('itemImgUrl').value = '';

renderList();
alert('Item added!');
}

function readFileAsDataURL(file){
return new Promise((resolve, reject) => {
let reader = new FileReader();
reader.onload = () => resolve(reader.result);
reader.onerror = reject;
reader.readAsDataURL(file);
});
}

function deleteItem(index){
let menu = getMenu();
menu.splice(index, 1);
saveMenu(menu);
renderList();
}

function renderList(){
let menu = getMenu();
let list = document.getElementById('itemList');
list.innerHTML = '<h3>Current Items</h3>';

menu.forEach((item, idx) => {
let div = document.createElement('div');
div.className = 'item';
div.innerHTML = `
<span>${item.name} - Rs. ${item.price} (${item.category})</span>
<button class="deleteBtn" onclick="deleteItem(${idx})">Delete</button>
`;
list.appendChild(div);
});
}

window.addEventListener('load', checkAdminAccess);

function isAuthenticated(){
return sessionStorage.getItem('adminAuthenticated')==='true';
}

function authenticateAdmin(){
let pwd = document.getElementById('adminPassword').value;
if(pwd === ADMIN_PASSWORD){
sessionStorage.setItem('adminAuthenticated','true');
checkAdminAccess();
}else{
alert('Incorrect password');
}
}

function checkAdminAccess(){
if(isAuthenticated()){
document.getElementById('adminContent').style.display='block';
document.getElementById('loginOverlay').style.display='none';
renderList();
}else{
document.getElementById('adminContent').style.display='none';
document.getElementById('loginOverlay').style.display='flex';
document.getElementById('adminPassword').value='';
document.getElementById('adminPassword').focus();
}
}
</script>

</body>
</html>
